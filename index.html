      height: 100vh;

      overflow: hidden;
      z-index: -1;

      .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      animation: floatBlob 20s infinite alternate ease-in-out;
      }
      .blob-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: rgba(88, 166, 255, 0.4);
      animation-duration: 25s;

      .blob-2 {
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: rgba(63, 185, 80, 0.3);
      animation-delay: -5s;
      animation-duration: 30s;
      }
      .blob-3 {

      left: 40%;
      width: 45vw;
      height: 45vw;
      background: rgba(137, 87, 229, 0.3);
      animation-delay: -10s;
      animation-duration: 28s;
      }
      @keyframes floatBlob {
      0% {
      transform: translate(0, 0) scale(1);
      }
      33% {
      transform: translate(5%, 10%) scale(1.1);
      }
      66% {
      transform: translate(-5%, -5%) scale(0.9);
      }
      100% {
      transform: translate(10%, -10%) scale(1.05);
      }

      // 3. DATA PROYEK
      const projectData = [

      // === FUNGSI RENDER HTML DINAMIS ===
      function renderHTML() {
      // Render Tags
      const tagsContainer = document.getElementById("tags-container");
      myTags.forEach((tag, index) => {
      const colorClass = tagColors[index % tagColors.length];
      tagsContainer.innerHTML += `<span class="${colorClass} transition text-[10px] px-2 py-0.5 rounded-full font-medium border">${tag}</span>`;
      });
      
      // Render Playlist
      const playlistContainer = document.getElementById("playlist-container");
      playlistTracks.forEach((track, index) => {
      playlistContainer.innerHTML += `
      <div onclick="playTrack(${index})" class="playlist-item flex justify-between items-center p-2 rounded-md hover:bg-gh_hover transition cursor-pointer" data-index="${index}">
          <div class="flex items-center gap-2">
               <span class="text-gh_muted text-[10px] font-mono w-3">${track.num}</span>
               <div class="truncate max-w-[120px]">
                   <p class="track-title text-gh_text text-[11px] truncate">${track.title}</p>
                   <p class="text-gh_muted text-[9px] truncate">${track.artist}</p>
               </div>
          </div>
          <span class="text-gh_muted text-[10px] font-mono">${track.duration}</span>
      </div>`;
      });
      
      // Render Projects - Dibagi menjadi 2 kolom (Ganjil Genap)
      const container1 = document.getElementById("projects-container-1");
      const container2 = document.getElementById("projects-container-2");
      
      projectData.forEach((project, index) => {
      const html = `
      <div onclick="openModal(${index})" class="bg-gh_card/90 backdrop-blur-xl p-5 rounded-xl border border-gh_border hover:border-gh_muted transition duration-300 flex flex-col h-full relative overflow-hidden group cursor-pointer shadow-md">
          <div class="absolute inset-y-0 right-0 w-3/4 z-0 pointer-events-none opacity-15 group-hover:opacity-25 transition-opacity">
              <img src="${project.bg}" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-gradient-to-r from-gh_card via-gh_card/80 to-transparent"></div>
          </div>
          <div class="relative z-10 flex flex-col h-full">
              <div class="flex items-center gap-2 mb-2">
                  <i class="ri-book-mark-line text-gh_muted text-sm"></i>
                  <span class="text-sm font-semibold text-gh_blue group-hover:underline break-all">${project.title}</span>
                  <span class="text-[9px] text-gh_muted border border-gh_border rounded-full px-1.5 py-0.5 ml-auto font-medium">${project.visibility}</span>
              </div>
              <p class="text-gh_muted text-xs mb-4 line-clamp-2">${project.desc}</p>
              <div class="flex items-center gap-3 text-[10px] text-gh_muted mt-auto pt-2">
                  <div class="flex items-center gap-1">
                      <span class="w-2 h-2 rounded-full ${project.lang_color}"></span>
                      <span>${project.lang}</span>
                  </div>
                  <span class="flex items-center gap-1"><i class="ri-star-line"></i>${project.stars}</span>
                  <span class="flex items-center gap-1"><i class="ri-git-branch-line"></i>${project.forks}</span>
              </div>
          </div>
      </div>`;
      
      // Pembagian kolom: index genap ke kiri, ganjil ke kanan
      if (index % 2 === 0) {
      container1.innerHTML += html;
      } else {
      container2.innerHTML += html;
      }
      });
      }
      
      // === LOGIKA MODAL ===
      const modal = document.getElementById("project-modal");
      const modalContent = document.getElementById("modal-content");
      
      function openModal(index) {
        const data = projectData[index];
        document.getElementById("modal-title").innerText = data.title;
        document.getElementById("modal-desc").innerText = data.desc;
        document.getElementById("modal-image").src = data.screenshot;
      
        const btnGithub = document.getElementById("modal-github");
        if (data.github_link !== "") {
          btnGithub.href = data.github_link;
          btnGithub.style.display = "inline-flex";
        } else {
          btnGithub.style.display = "none";
        }
      
        const btnWeb = document.getElementById("modal-website");
        if (data.website_link !== "") {
          btnWeb.href = data.website_link;
          btnWeb.style.display = "inline-flex";
        } else {
          btnWeb.style.display = "none";
        }
      
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          modalContent.classList.remove("scale-95");
          modalContent.classList.add("scale-100");
        }, 10);
      }
      
      function closeModal() {
        modal.classList.add("opacity-0");
        modalContent.classList.remove("scale-100");
        modalContent.classList.add("scale-95");
        setTimeout(() => {
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }, 300);
      }
      
      modal.addEventListener("click", function (e) {
        if (e.target === modal) closeModal();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !modal.classList.contains("hidden"))
          closeModal();
      });
      
      // === LOGIKA MUSIC PLAYER ===
      let currentTrackIndex = 0;
      const audio = document.getElementById("audio-player");
      const playBtn = document.getElementById("play-btn");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const iconPlay = document.getElementById("icon-play");
      const iconPause = document.getElementById("icon-pause");
      const progressBar = document.getElementById("progress-bar");
      const progressContainer = document.getElementById("progress-container");
      const album = document.getElementById("player-album");
      const playerBg = document.getElementById("player-bg");
      const playerTitle = document.getElementById("player-title");
      const playerArtist = document.getElementById("player-artist");
      
      function initPlayer() {
        if (playlistTracks.length > 0) {
          loadTrack(currentTrackIndex);
        }
      }
      
      function loadTrack(index) {
        const track = playlistTracks[index];
        audio.src = track.src;
        playerTitle.innerText = track.title;
        playerArtist.innerText = track.artist;
        album.src = track.img;
        if (playerBg) playerBg.src = track.img;
        updateActivePlaylistStyling(index);
      }
      
      function playTrack(index) {
        currentTrackIndex = index;
        loadTrack(currentTrackIndex);
        audio.play();
        updatePlayIcon(true);
      }
      
      function updateActivePlaylistStyling(activeIndex) {
        const items = document.querySelectorAll(".playlist-item");
        items.forEach((item, index) => {
          if (index === activeIndex) {
            item.classList.add("track-active");
          } else {
            item.classList.remove("track-active");
          }
        });
      }
      
      function updatePlayIcon(isPlaying) {
        if (isPlaying) {
          iconPlay.classList.add("hidden");
          iconPause.classList.remove("hidden");
        } else {
          iconPlay.classList.remove("hidden");
          iconPause.classList.add("hidden");
        }
      }
      
      playBtn.addEventListener("click", function () {
        if (audio.paused) {
          audio.play();
          updatePlayIcon(true);
        } else {
          audio.pause();
          updatePlayIcon(false);
        }
      });
      
      nextBtn.addEventListener("click", function () {
        currentTrackIndex++;
        if (currentTrackIndex > playlistTracks.length - 1)
          currentTrackIndex = 0;
        playTrack(currentTrackIndex);
      });
      
      prevBtn.addEventListener("click", function () {
        currentTrackIndex--;
        if (currentTrackIndex < 0)
          currentTrackIndex = playlistTracks.length - 1;
        playTrack(currentTrackIndex);
      });
      
      audio.addEventListener("timeupdate", function () {
        if (audio.duration) {
          const percentage = (audio.currentTime / audio.duration) * 100;
          progressBar.style.width = percentage + "%";
        }
      });
      
      progressContainer.addEventListener("click", function (e) {
        const width = this.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
      });
      
      audio.addEventListener("ended", function () {
        nextBtn.click();
      });
      
      // === START APLIKASI ===
      // 1. Generate HTML dari Data JS
      renderHTML();
      // 2. Siapkan Music Player
      initPlayer();
    </script>
  </body>
</html>
